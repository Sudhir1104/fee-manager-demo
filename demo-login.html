<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fee Manager — Sign In</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0f1923;--blue:#2563eb;--blue-light:#eff6ff;
  --red:#dc2626;--border:#e2e8f0;--muted:#64748b;
  --card:#ffffff;--bg:#f8fafc;--radius:12px;
}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(37,99,235,0.08) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 100%,rgba(5,150,105,0.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.wrapper{position:relative;z-index:1;width:100%;max-width:420px;}
.top-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-light);color:var(--blue);
  font-size:12px;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;padding:5px 12px;border-radius:20px;
  margin-bottom:18px;border:1px solid rgba(37,99,235,0.15);
}
.headline{
  font-family:'DM Serif Display',serif;font-size:32px;
  color:var(--ink);line-height:1.15;margin-bottom:8px;
}
.sub{color:var(--muted);font-size:15px;margin-bottom:28px;line-height:1.6;}
.card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);padding:30px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}
.field{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;
  color:var(--ink);background:white;transition:border-color 0.2s,box-shadow 0.2s;outline:none;
}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.btn{
  width:100%;padding:13px;background:var(--blue);color:white;
  border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;
  margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{background:#1d4ed8;}
.btn:disabled{background:#93c5fd;cursor:not-allowed;}
.error-msg{
  display:none;color:var(--red);font-size:13px;margin-top:10px;
  padding:10px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;
}
.signup-link{text-align:center;margin-top:18px;font-size:13px;color:var(--muted);}
.signup-link a{color:var(--blue);text-decoration:none;font-weight:600;}
.spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);
  border-top-color:white;border-radius:50%;
  animation:spin 0.7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="top-badge">🔐 Sign In</div>
  <h1 class="headline">Welcome back</h1>
  <p class="sub">Sign in to your organisation's fee manager.</p>

  <div class="card">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()" id="loginBtn">
      <span id="btnText">Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="signup-link">Don't have an account? <a href="demo-signup.html">Start free trial</a></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ── REPLACE with your demo Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyCNFivl8UFbM5oA-oXXovUAp37wPZxjE6M",
  authDomain: "fee-manager-demo.firebaseapp.com",
  projectId: "fee-manager-demo",
  storageBucket: "fee-manager-demo.firebasestorage.app",
  messagingSenderId: "240717295816",
  appId: "1:240717295816:web:e610949997d4aa190bb5fd"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// If already signed in, resolve tenant and redirect
onAuthStateChanged(auth, async user => {
  if(user){
    await resolveTenant(user.uid);
    window.location.href = 'demo-app.html';
  }
});

async function resolveTenant(uid){
  let snap = await getDoc(doc(db, 'users', uid));
  if(snap.exists()){
    sessionStorage.setItem('tenantId', snap.data().tenantId);
    sessionStorage.setItem('uid', uid);
  }
}

window.login = async function(){
  let email    = document.getElementById('email').value.trim();
  let password = document.getElementById('password').value;
  let err = document.getElementById('errorMsg');
  err.style.display = 'none';

  if(!email || !password){ showError('Please enter email and password.'); return; }

  setLoading(true);
  try {
    let cred = await signInWithEmailAndPassword(auth, email, password);
    await resolveTenant(cred.user.uid);
    window.location.href = 'demo-app.html';
  } catch(e){
    setLoading(false);
    if(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      showError('Incorrect email or password.');
    else showError('Error: ' + e.message);
  }
};

function showError(msg){
  let el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function setLoading(on){
  document.getElementById('loginBtn').disabled = on;
  document.getElementById('btnText').textContent = on ? 'Signing in…' : 'Sign In';
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}
</script>
</body>
</html>
